services:
  mysql:
    image: mysql:8.0
    container_name: projeto-receitas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: projeto_receitas
      MYSQL_USER: usuario_teste
      MYSQL_PASSWORD: senha123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uusuario_teste", "-psenha123"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
